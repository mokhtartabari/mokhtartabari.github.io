name: Sync charts from data repos

on:
  repository_dispatch:
    types: [charts-updated]
  schedule:
    # Daily at 07:00 UTC — safety net regardless of dispatch
    - cron: "0 7 * * *"
  workflow_dispatch:

concurrency:
  group: sync-charts
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout website
        uses: actions/checkout@v4

      - name: Sync inflation charts
        run: |
          mkdir -p public/charts/inflation

          # Download manifest
          curl -fsSL \
            "https://raw.githubusercontent.com/mokhtartabari/inflation-data-viz/main/charts-manifest.json" \
            -o src/data/charts-manifest-inflation.json \
            || echo '{"topic":"inflation","updated":null,"charts":[]}' \
              > src/data/charts-manifest-inflation.json

          # Download each PNG listed in the manifest
          python3 - <<'PYEOF'
          import json, urllib.request, os, sys

          try:
              manifest = json.load(open("src/data/charts-manifest-inflation.json"))
          except Exception as e:
              print(f"Could not read inflation manifest: {e}")
              sys.exit(0)

          ok, fail = 0, 0
          for c in manifest.get("charts", []):
              url  = c.get("url", "")
              dest = f"public/charts/inflation/{c['filename']}"
              if not url:
                  continue
              try:
                  urllib.request.urlretrieve(url, dest)
                  ok += 1
              except Exception as ex:
                  print(f"  ✗ {c['filename']}: {ex}")
                  fail += 1

          print(f"Inflation: {ok} downloaded, {fail} failed")
          PYEOF

      - name: Sync GDP charts
        run: |
          mkdir -p public/charts/gdp

          # Download manifest
          curl -fsSL \
            "https://raw.githubusercontent.com/mokhtartabari/gdp-data-viz/main/charts-manifest.json" \
            -o src/data/charts-manifest-gdp.json \
            || echo '{"topic":"gdp","updated":null,"charts":[]}' \
              > src/data/charts-manifest-gdp.json

          # Download each PNG listed in the manifest
          python3 - <<'PYEOF'
          import json, urllib.request, os, sys

          try:
              manifest = json.load(open("src/data/charts-manifest-gdp.json"))
          except Exception as e:
              print(f"Could not read GDP manifest: {e}")
              sys.exit(0)

          ok, fail = 0, 0
          for c in manifest.get("charts", []):
              url  = c.get("url", "")
              dest = f"public/charts/gdp/{c['filename']}"
              if not url:
                  continue
              try:
                  urllib.request.urlretrieve(url, dest)
                  ok += 1
              except Exception as ex:
                  print(f"  ✗ {c['filename']}: {ex}")
                  fail += 1

          print(f"GDP: {ok} downloaded, {fail} failed")
          PYEOF

      - name: Commit changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/charts/ src/data/charts-manifest-*.json
          if git diff --staged --quiet; then
            echo "Nothing changed — skipping commit"
          else
            git commit -m "sync: update charts from data repos [$(date -u '+%Y-%m-%d')]"
            git push
          fi
