name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
  repository_dispatch:
    types: [charts-updated]
  workflow_dispatch:
  schedule:
    # Safety net: rebuild periodically so newly generated charts in the private
    # data-viz repos get pulled in even when the viz pipeline can't trigger a
    # rebuild directly (its PAT is read-only on this repo). Every 6 hours.
    - cron: "0 */6 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build site (includes fetching data)
        env:
          GH_PAT: ${{ secrets.WEBSITE_DISPATCH_TOKEN }}
          PUBLIC_SUPABASE_URL: ${{ vars.PUBLIC_SUPABASE_URL }}
          PUBLIC_SUPABASE_ANON_KEY: ${{ vars.PUBLIC_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
