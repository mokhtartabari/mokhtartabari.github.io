name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
  repository_dispatch:
    types: [charts-updated]
  workflow_dispatch:
  schedule:
    # Daily backstop only. The data-viz pipelines trigger an immediate rebuild
    # via repository_dispatch[charts-updated] (the PAT has write access here),
    # so this cron exists solely to catch a missed dispatch. 15:00 UTC lands
    # after the 08:30 ET StatCan releases and the daily rates run (12:00 UTC).
    - cron: "0 15 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Record start time
        run: echo "PIPELINE_START=$(date +%s)" >> "$GITHUB_ENV"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build site (includes fetching data)
        env:
          GH_PAT: ${{ secrets.WEBSITE_DISPATCH_TOKEN }}
          PUBLIC_SUPABASE_URL: ${{ vars.PUBLIC_SUPABASE_URL }}
          PUBLIC_SUPABASE_ANON_KEY: ${{ vars.PUBLIC_SUPABASE_ANON_KEY }}
          PUBLIC_ADMIN_PASSCODE: ${{ secrets.PUBLIC_ADMIN_PASSCODE || vars.PUBLIC_ADMIN_PASSCODE }}
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      # Log to the admin dashboard, but skip the 6-hourly safety-net rebuilds (noise).
      - name: Log run to dashboard
        if: always() && github.event_name != 'schedule'
        env:
          SB_URL: ${{ vars.PUBLIC_SUPABASE_URL }}
          SB_KEY: ${{ vars.PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          [ -z "$SB_URL" ] && exit 0
          end=$(date +%s); start=${PIPELINE_START:-$end}; dur=$((end - start))
          [ "${{ job.status }}" = "success" ] && st=success || st=failure
          curl -s -X POST "$SB_URL/rest/v1/pipeline_logs" \
            -H "apikey: $SB_KEY" -H "Authorization: Bearer $SB_KEY" \
            -H "Content-Type: application/json" -H "Prefer: return=minimal" \
            -d "{\"pipeline_name\":\"deploy\",\"status\":\"$st\",\"message\":\"${{ github.event_name }} run #${{ github.run_number }}\",\"duration_seconds\":$dur}" || true

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
